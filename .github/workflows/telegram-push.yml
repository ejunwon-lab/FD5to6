name: Telegram Push (intraday P&L)

# F 구조 — "단일 신뢰 시작 + 자체 루프" (2026-06-09, 설계: docs/plans/2026-06-09-텔레그램-스케줄러-신뢰성.md)
#
# 문제: GitHub Actions schedule은 best-effort라 매-틱 정시 보장 X (실측 2/21).
# 해결: GitHub은 "잡 시작"만 담당. 잡 내부 sleep 루프가 5분마다 GAS(action=pushPnL)를 poke.
#   - 루프 내부 sleep은 OS 시계라 완벽히 정시 (실측 run 27202390183으로 증명).
#   - 카덴스(~20분)·휴장·시간대·중복은 GAS의 tgPushPnL이 18분 dedup + 거래일 + 09:00~16:00로 자체 결정.
#   - GAS dedup이 중복 poke를 무해화 → 겹치는 잡/중복 시작 틱을 마음껏 써도 발송은 슬롯당 1회.
#
# redundancy로 (a)시작 드롭 (b)6시간 잡 상한 (c)러너 중도 사망 을 흡수:
#   - 시작 틱을 전 시간대에 20분 간격으로 펼침(개정 2026-06-10): GitHub이 한 윈도우를
#     통째 드롭해도(6/10 아침 실제 발생) 다음 틱이 ~20분 내 시작. 틱이 시각에 몰리면(구버전
#     09:00·09:03처럼) 그 윈도우 드롭 시 전멸 → 펼쳐서 회피.
#   - 한 잡 120분: 시작 틱 6개분(120/20)을 겹쳐 커버 → 연속 드롭 5회까지 공백 없음.
#   - 6h 상한: 120분 잡이라 무관. 겹치는 잡: 한 러너 죽어도 다음 틱 잡이 계속 poke.
# concurrency 제어 없음 — 겹침(상시 ~6 동시 잡)은 GAS dedup이 무해화, public repo라 분 무료.
# GitHub 한계: 그래도 schedule은 best-effort라 아침 장시간 드롭 시 첫 푸시가 늦을 수 있음.
#   완전 정시 보장은 Cloudflare Worker cron(인증 필요)으로만. 그 전까진 이 spread가 최선.
#
# ⚠️ GAS 의존: tgPushPnL의 dedup이 *배포*돼 있어야 함(v10 배포 완료). 미배포 시 5분마다 스팸.

on:
  schedule:
    # UTC. KST=UTC+9. 장중 09:00~16:00 KST = 00:00~07:00 UTC. 매시 :00/:20/:40, 월~금.
    # (실제 휴장·09:00 이전·16:00 이후는 GAS tgPushPnL이 자체 컷)
    - cron: '0,20,40 0-6 * * 1-5'
  workflow_dispatch:
    inputs:
      minutes:
        description: '루프 지속(분)'
        default: '120'

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - name: Self-loop poking GAS pushPnL
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
          MINUTES: ${{ github.event.inputs.minutes || '120' }}
        run: |
          if [ -z "$GAS_WEB_APP_URL" ] || [ -z "$TG_WEBHOOK_SECRET" ]; then
            echo "⏭️ GAS_WEB_APP_URL / TG_WEBHOOK_SECRET 미설정 — soft skip (롤아웃 전이면 정상)"
            exit 0
          fi
          POKE_GAP=300                                   # 5분
          END=$(( $(date -u +%s) + MINUTES * 60 ))
          echo "=== 시작 $(date -u '+%H:%M:%S') UTC | ${MINUTES}분 동안 ${POKE_GAP}s 간격 poke ==="
          n=0
          while [ "$(date -u +%s)" -lt "$END" ]; do
            n=$((n + 1))
            # GAS 웹앱: POST→302→googleusercontent echo 리다이렉트. -X POST 금지(echo가 405).
            #   --data가 초기요청을 POST로(doPost 실행), -L이 302를 GET으로 따라가 결과 회수.
            code=$(curl -sS -L -o /tmp/resp.txt -w '%{http_code}' \
              "$GAS_WEB_APP_URL" \
              -H 'Content-Type: application/json' \
              --data "{\"action\":\"pushPnL\",\"secret\":\"${TG_WEBHOOK_SECRET}\"}" || echo 000)
            printf '%s UTC  poke#%s  HTTP=%s  resp=%s\n' \
              "$(date -u '+%H:%M:%S')" "$n" "$code" "$(cat /tmp/resp.txt 2>/dev/null)"
            # 남은 시간이 간격 이하면 종료 (window 넘어 잠들지 않게)
            [ "$(( END - $(date -u +%s) ))" -le "$POKE_GAP" ] && break
            sleep "$POKE_GAP"
          done
          echo "=== 종료 $(date -u '+%H:%M:%S') UTC | poke ${n}회 ==="
