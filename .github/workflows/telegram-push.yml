name: Telegram Push (intraday P&L)

# Daisy-chain 구조 — "자기 자신을 잇는 체인 + cron은 재시동 백업" (2026-06-10, 설계: docs/plans/2026-06-10-텔레그램-daisy-chain.md)
#
# 연혁: GAS 트리거(best-effort) → GitHub cron 21틱(best-effort, 21중2 발화) → F 구조(spread cron+루프)
#   → 6/10 실측 spread 후에도 18틱 중 2틱만 발화(고빈도 cron일수록 통째 드롭) → 체인 전환.
#   교훈 "best-effort 의존 횟수를 줄여라"의 극한: 정상상태에서 cron 의존 0회.
#
# 동작: 각 run이 120분 sleep 루프(5분마다 GAS action=pushPnL poke) 후 종료 직전
#   workflow_dispatch로 다음 run을 self-dispatch (GITHUB_TOKEN 예외 규칙 — workflow_dispatch는
#   재귀 방지 대상에서 제외). dispatch는 이벤트 구동이라 cron과 달리 드롭 안 됨(6/8~10 실측 0건).
#   카덴스(~20분)·휴장·시간대·중복은 GAS tgPushPnL이 18분 dedup으로 단일 결정 (v13 — result 에코 포함).
#
# 체인 관리:
#   - concurrency group: 체인 생존 중 cron 백업이 발화해도 pending 1개로 수렴(증식 불가).
#     pending run은 현 run 종료 즉시 이어받음 → 체인은 항상 single-file.
#   - 체인 사망(러너 죽음·dispatch 실패) 시: cron 백업(장중 20분 격자)이 재시드.
#   - ⏹️ 완전 정지: run 취소만으론 cron이 재시드함 → `gh workflow disable "Telegram Push (intraday P&L)"`.
#   - 24/7 체인: 장외·주말 poke는 GAS가 즉시 skip(result=skip-offhours/holiday) — 다음 거래일 아침을
#     cron에 의존하지 않기 위한 비용 (public repo라 분 무료).
#   - ⚠️ 수동 dispatch 시 minutes는 125 이하(timeout-minutes=130에 잘림).
#
# ⚠️ GAS 의존: tgPushPnL dedup+result가 배포돼 있어야 함(v13). 미배포 시 5분마다 스팸.

on:
  schedule:
    # 재시동 백업 전용 (체인 생존 중엔 concurrency가 흡수). UTC. 장중 09:00~16:00 KST = 00:00~07:00 UTC.
    - cron: '0,20,40 0-6 * * 1-5'
    # 일요일 reseed — 주간 리포트(13:0x KST) 1시간 전 체인 보장 (주말 무재시드 갭 보강). 03:00 UTC = 12:00 KST.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      minutes:
        description: '루프 지속(분, 최대 125)'
        default: '120'

permissions:
  actions: write    # self-dispatch + market-report dispatch (gh workflow run) 용
  contents: read    # market-report 리포트 파일 존재 확인 (gh api contents) 용

concurrency:
  group: telegram-push-chain
  cancel-in-progress: false   # 실행 중 run 보호 — 새 run은 pending으로 대기

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 130
    steps:
      - name: Self-loop poking GAS pushPnL
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
          MINUTES: ${{ github.event.inputs.minutes || '120' }}
          GH_TOKEN: ${{ github.token }}            # market-report dispatch/contents 확인용
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -z "$GAS_WEB_APP_URL" ] || [ -z "$TG_WEBHOOK_SECRET" ]; then
            echo "⏭️ GAS_WEB_APP_URL / TG_WEBHOOK_SECRET 미설정 — soft skip (롤아웃 전이면 정상)"
            exit 0
          fi
          POKE_GAP=300                                   # 5분
          END=$(( $(date -u +%s) + MINUTES * 60 ))
          echo "=== 시작 $(date -u '+%H:%M:%S') UTC | ${MINUTES}분 동안 ${POKE_GAP}s 간격 poke ==="

          # ── market-report 정시 dispatch (cron 지연 우회) ──────────────────
          # 체인이 24/7 alive인 김에 리포트 창(KST 08:0x US / 17:0x KR) 통과를 감지해
          # market-report를 auto dispatch. 멱등은 ① 이 run 내 /tmp 메모 ② market-report
          # job concurrency+가드 2중으로 보장. (기존 contents API 존재확인은 리포트가
          # private repo(FD5to6-reports)로 분리되며 제거 — GITHUB_TOKEN으로 못 읽고,
          # 최악의 경우도 체인 재시작 후 여분 dispatch 1회가 가드에서 즉시 skip됨.
          # 설계: docs/plans/2026-07-04-리포트-private-분리.md)
          # ⚠️ 전체를 || true로 격리 — 어떤 실패도 poke 루프/체인 dispatch에 영향 없음.
          maybe_dispatch_report() {   # $1=type(us|kr|weekly) $2=prefix(미사용, 호출부 유지)
            local t="$1" pre="$2" today
            today=$(TZ='Asia/Seoul' date +%Y-%m-%d)
            [ -f "/tmp/mr_${t}_${today}" ] && return 0          # 이 run에서 이미 dispatch
            echo "  ↳ market-report dispatch: type=${t} auto=true (${today})"
            gh workflow run "Market Report (US/KR)" --ref main -f type="${t}" -f auto=true -R "${GITHUB_REPOSITORY}" \
              && touch "/tmp/mr_${t}_${today}"
            return 0
          }
          check_report_windows() {
            local dow hm
            dow=$(TZ='Asia/Seoul' date +%u)                     # 1=월 .. 7=일
            hm=$((10#$(TZ='Asia/Seoul' date +%H%M)))            # 10# = 08xx octal 파싱 버그 회피
            # 일요일(7): 주간 리포트 창 13:02~13:59 KST → market-report type=weekly dispatch
            if [ "$dow" -eq 7 ]; then
              [ "$hm" -ge 1302 ] && [ "$hm" -le 1359 ] && maybe_dispatch_report weekly WEEK
              return 0
            fi
            [ "$dow" -gt 5 ] && return 0                         # 토요일은 리포트 없음
            [ "$hm" -ge 802 ]  && [ "$hm" -le 859 ]  && maybe_dispatch_report us US
            [ "$hm" -ge 1702 ] && [ "$hm" -le 1759 ] && maybe_dispatch_report kr KR
            return 0
          }

          n=0
          while [ "$(date -u +%s)" -lt "$END" ]; do
            n=$((n + 1))
            # GAS 웹앱: POST→302→googleusercontent echo 리다이렉트. -X POST 금지(echo가 405).
            #   --data가 초기요청을 POST로(doPost 실행), -L이 302를 GET으로 따라가 결과 회수.
            code=$(curl -sS -L -o /tmp/resp.txt -w '%{http_code}' \
              "$GAS_WEB_APP_URL" \
              -H 'Content-Type: application/json' \
              --data "{\"action\":\"pushPnL\",\"secret\":\"${TG_WEBHOOK_SECRET}\"}" || echo 000)
            printf '%s UTC  poke#%s  HTTP=%s  resp=%s\n' \
              "$(date -u '+%H:%M:%S')" "$n" "$code" "$(cat /tmp/resp.txt 2>/dev/null)"
            check_report_windows || true               # 리포트 정시 dispatch (격리 — 실패 무해)
            # 남은 시간이 간격 이하면 종료 (window 넘어 잠들지 않게)
            [ "$(( END - $(date -u +%s) ))" -le "$POKE_GAP" ] && break
            sleep "$POKE_GAP"
          done
          echo "=== 종료 $(date -u '+%H:%M:%S') UTC | poke ${n}회 ==="

      - name: Dispatch next chain run
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 파이프 금지 — 실제 exit code로 판정 (errors.md 2026-06-10 push|tail 교훈)
          for i in 1 2 3; do
            if gh workflow run "${{ github.workflow }}" --ref main -f minutes=120 -R "${{ github.repository }}"; then
              echo "✓ 다음 체인 run dispatch 성공 (시도 $i)"
              exit 0
            fi
            echo "✗ dispatch 실패 (시도 $i) — 10s 후 재시도"
            sleep 10
          done
          echo "🔴 dispatch 3회 실패 — 체인 끊김. cron 백업이 재시드할 때까지 푸시 공백 가능."
          exit 1

      # 체인 끊김을 텔레그램으로 능동 통보 — cron 재시드 전까지의 무음 공백 가시화 (docs/plans/2026-07-03-무음실패-알림.md)
      - name: Alert on chain break
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          MSG="🔴 텔레그램 푸시 체인 끊김 — cron 재시드 전까지 장중 푸시 공백 가능. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IFS=',' read -ra IDS <<< "$TG_CHAT_IDS"
          for id in "${IDS[@]}"; do
            curl -sS -m 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="$(echo "$id" | tr -d ' ')" --data-urlencode text="$MSG" >/dev/null || true
          done
