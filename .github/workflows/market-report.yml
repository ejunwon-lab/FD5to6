name: Market Report (US/KR)

# 거래일 한국시간 08시·17시대에 분석 + Telegram 발송
# - US: 일~목 UTC 23시대 = 월~금 KST 08시대 (전날 미국 마감 리포트)
# - KR: 월~금 UTC 08시대 = 월~금 KST 17시대 (당일 한국 마감 리포트)
#
# 정시화 (2026-06-11, 설계: docs/plans/2026-06-11-market-report-정시화-daisychain.md):
#   GH schedule cron이 best-effort라 KR 리포트가 타깃 17:02 KST 대비 +3.3~3.8h 지연 발화(6/9~11).
#   → telegram-push daisy-chain(24/7 alive, 검증됨)이 창(08:02·17:02 KST) 통과 시
#     `gh workflow run`으로 type=<t> auto=true dispatch(이벤트 구동이라 지연 0) = **정시 발화 주경로**.
#   아래 cron 4개는 **체인 사망 시 재시드 백업으로 강등**(삭제 안 함 — telegram과 동일 패턴).
#
# 멱등 보장 (반복 dispatch 레이스 회피 — errors.md:32 "2회 안전망 race" 동류):
#   - auto=true dispatch: schedule과 동일하게 "오늘 파일 있으면 skip" 가드 적용.
#   - job별 concurrency group: 중복 dispatch는 1 running + 1 pending으로 수렴, pending이
#     이어받을 때 커밋된 파일을 보고 skip → 단일 발송.
#   - 안전망 2회 cron(40분 간격)도 동일 가드로 중복 방지.
#   - US: KST 08:02 / 08:42, KR: KST 17:02 / 17:42.
# workflow_dispatch(auto 미지정·수동)는 항상 재생성·재발송 (guard 무시).

on:
  schedule:
    - cron: '2 23 * * 0-4'    # US 1차 — KST 08:02
    - cron: '42 23 * * 0-4'   # US 2차 — KST 08:42 (1차 누락 시 백업)
    - cron: '2 8 * * 1-5'     # KR 1차 — KST 17:02
    - cron: '42 8 * * 1-5'    # KR 2차 — KST 17:42
    - cron: '2 4 * * 0'       # 주간 1차 — 일요일 KST 13:02 (지난주 리캡+새주 계획)
    - cron: '42 4 * * 0'      # 주간 2차 — 일요일 KST 13:42 (1차 누락 시 백업)
  workflow_dispatch:
    inputs:
      type:
        description: 'Report type'
        type: choice
        options: [us, kr, both, weekly]
        default: both
      dry_run:
        description: '테스트: 리포트 생성만, 텔레그램 발송·commit 안 함'
        type: boolean
        default: false
      auto:
        description: '자동 dispatch(체인): schedule처럼 오늘 파일 있으면 skip(멱등)'
        type: boolean
        default: false

permissions:
  contents: write   # docs/reports/ commit·push 용

jobs:
  us-report:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '2 23 * * 0-4' || github.event.schedule == '42 23 * * 0-4')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.type == 'us' || inputs.type == 'both'))
    runs-on: ubuntu-latest
    # 중복 dispatch 수렴(멱등): 1 running + 1 pending, pending은 가드로 skip
    concurrency:
      group: market-report-us
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already sent today (schedule·auto dispatch)
        id: guard
        run: |
          DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT=docs/reports/US-${DATE_KST}.md
          # 가드 적용 대상: schedule 또는 auto=true dispatch (수동 dispatch는 강제 재생성)
          GUARD_ON=no
          [ "${{ github.event_name }}" = "schedule" ] && GUARD_ON=yes
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.auto }}" = "true" ] && GUARD_ON=yes
          if [ "$GUARD_ON" = "yes" ] && [ -f "$REPORT" ]; then
            echo "already=yes" >> $GITHUB_OUTPUT
            echo "⏭️ 오늘(${DATE_KST}) US 리포트 이미 발송됨 — skip"
          else
            echo "already=no" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.guard.outputs.already == 'no'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code CLI
        if: steps.guard.outputs.already == 'no'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Generate US report (Claude CLI headless)
        if: steps.guard.outputs.already == 'no'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 내 포트 지표(익스포저·최근추세) — 미국→한국 반도체 선행 연결용. public 프롬프트 미노출(env로만).
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          claude -p "$(cat .github/scripts/us-prompt.md)" \
            --allowedTools "WebFetch,Bash,Read,Write" \
            --max-turns 25 \
            --model claude-sonnet-4-6

      - name: Determine report file path
        if: steps.guard.outputs.already == 'no'
        id: path
        run: |
          DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT=docs/reports/US-${DATE_KST}.md
          echo "date_kst=${DATE_KST}" >> $GITHUB_OUTPUT
          echo "report=${REPORT}" >> $GITHUB_OUTPUT
          if [ -f "$REPORT" ]; then
            echo "found=yes" >> $GITHUB_OUTPUT
            echo "✓ found $REPORT"
            wc -c "$REPORT"
            echo "----- REPORT 본문 -----"; cat "$REPORT"; echo "----- END -----"
          else
            echo "found=no" >> $GITHUB_OUTPUT
            echo "✗ not found $REPORT (실패 — 휴장도 직전거래일 폴백으로 파일 생성이 정상, 2026-06-20 PB 개편)"
            ls -la docs/reports/ 2>/dev/null || true
          fi

      # 무음 실패 제거 — 생성 실패를 텔레그램 경고+빨간 run으로 가시화 (docs/plans/2026-07-03-무음실패-알림.md)
      - name: Alert on generation failure
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'no' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          MSG="⚠️ US 리포트 생성 실패 (${{ steps.path.outputs.date_kst }}) — 파일 미생성. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IFS=',' read -ra IDS <<< "$TG_CHAT_IDS"
          for id in "${IDS[@]}"; do
            curl -sS -m 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="$(echo "$id" | tr -d ' ')" --data-urlencode text="$MSG" >/dev/null || true
          done
          exit 1

      - name: Send to Telegram
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          python3 .github/scripts/send_telegram.py "${{ steps.path.outputs.report }}"

      - name: Send Email (GAS self)
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        continue-on-error: true   # 부가 채널 — 실패해도 텔레그램·커밋 진행
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          if [ -z "$GAS_WEB_APP_URL" ] || [ -z "$TG_WEBHOOK_SECRET" ]; then
            echo "⏭️ GAS env 미설정 — 이메일 skip"; exit 0
          fi
          SUBJECT="🌅 US Market Wrap — ${{ steps.path.outputs.date_kst }}"
          # jq --rawfile로 본문(마크다운·줄바꿈·특수문자) 안전 JSON 직렬화
          PAYLOAD=$(jq -n --arg s "$TG_WEBHOOK_SECRET" --arg sub "$SUBJECT" \
            --rawfile t "${{ steps.path.outputs.report }}" \
            '{action:"emailReport", secret:$s, subject:$sub, text:$t}')
          code=$(curl -sS -L -o /tmp/email_resp.txt -w '%{http_code}' "$GAS_WEB_APP_URL" \
            -H 'Content-Type: application/json' --data "$PAYLOAD" || echo 000)
          echo "이메일 HTTP=$code resp=$(cat /tmp/email_resp.txt 2>/dev/null)"

      - name: Commit report (이력 보존)
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        run: |
          git config user.email 'actions@github.com'
          git config user.name 'Market Report Bot'
          git add docs/reports/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "US report ${{ steps.path.outputs.date_kst }} [skip ci]"
            git push
          fi

  kr-report:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '2 8 * * 1-5' || github.event.schedule == '42 8 * * 1-5')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.type == 'kr' || inputs.type == 'both'))
    runs-on: ubuntu-latest
    concurrency:
      group: market-report-kr
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already sent today (schedule·auto dispatch)
        id: guard
        run: |
          DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT=docs/reports/KR-${DATE_KST}.md
          GUARD_ON=no
          [ "${{ github.event_name }}" = "schedule" ] && GUARD_ON=yes
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.auto }}" = "true" ] && GUARD_ON=yes
          if [ "$GUARD_ON" = "yes" ] && [ -f "$REPORT" ]; then
            echo "already=yes" >> $GITHUB_OUTPUT
            echo "⏭️ 오늘(${DATE_KST}) KR 리포트 이미 발송됨 — skip"
          else
            echo "already=no" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.guard.outputs.already == 'no'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code CLI
        if: steps.guard.outputs.already == 'no'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Generate KR report (Claude CLI headless)
        if: steps.guard.outputs.already == 'no'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 포트폴리오 지표(익스포저%·MDD)용 — 에이전트가 Bash로 $env 써서 GAS fetch.
          # public 프롬프트엔 URL·시크릿 안 박음(여기 env로만 주입).
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          claude -p "$(cat .github/scripts/kr-prompt.md)" \
            --allowedTools "WebFetch,Bash,Read,Write" \
            --max-turns 25 \
            --model claude-sonnet-4-6

      - name: Determine report file path
        if: steps.guard.outputs.already == 'no'
        id: path
        run: |
          DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT=docs/reports/KR-${DATE_KST}.md
          echo "date_kst=${DATE_KST}" >> $GITHUB_OUTPUT
          echo "report=${REPORT}" >> $GITHUB_OUTPUT
          if [ -f "$REPORT" ]; then
            echo "found=yes" >> $GITHUB_OUTPUT
            echo "✓ found $REPORT"
            wc -c "$REPORT"
            echo "----- REPORT 본문 -----"; cat "$REPORT"; echo "----- END -----"
          else
            echo "found=no" >> $GITHUB_OUTPUT
            echo "✗ not found $REPORT (실패 — 휴장도 직전거래일 폴백으로 파일 생성이 정상)"
            ls -la docs/reports/ 2>/dev/null || true
          fi

      # 무음 실패 제거 (docs/plans/2026-07-03-무음실패-알림.md)
      - name: Alert on generation failure
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'no' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          MSG="⚠️ KR 리포트 생성 실패 (${{ steps.path.outputs.date_kst }}) — 파일 미생성. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IFS=',' read -ra IDS <<< "$TG_CHAT_IDS"
          for id in "${IDS[@]}"; do
            curl -sS -m 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="$(echo "$id" | tr -d ' ')" --data-urlencode text="$MSG" >/dev/null || true
          done
          exit 1

      - name: Send to Telegram
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          python3 .github/scripts/send_telegram.py "${{ steps.path.outputs.report }}"

      - name: Send Email (GAS self)
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        continue-on-error: true   # 부가 채널 — 실패해도 텔레그램·커밋 진행
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          if [ -z "$GAS_WEB_APP_URL" ] || [ -z "$TG_WEBHOOK_SECRET" ]; then
            echo "⏭️ GAS env 미설정 — 이메일 skip"; exit 0
          fi
          SUBJECT="🌆 KR Market Close — ${{ steps.path.outputs.date_kst }}"
          PAYLOAD=$(jq -n --arg s "$TG_WEBHOOK_SECRET" --arg sub "$SUBJECT" \
            --rawfile t "${{ steps.path.outputs.report }}" \
            '{action:"emailReport", secret:$s, subject:$sub, text:$t}')
          code=$(curl -sS -L -o /tmp/email_resp.txt -w '%{http_code}' "$GAS_WEB_APP_URL" \
            -H 'Content-Type: application/json' --data "$PAYLOAD" || echo 000)
          echo "이메일 HTTP=$code resp=$(cat /tmp/email_resp.txt 2>/dev/null)"

      - name: Commit report
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        run: |
          git config user.email 'actions@github.com'
          git config user.name 'Market Report Bot'
          git add docs/reports/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "KR report ${{ steps.path.outputs.date_kst }} [skip ci]"
            git push
          fi

  # ── 주간 리포트 (일요일 13:0x KST) ─────────────────────────────────────────
  # 지난 한 주 리캡(포트+시장 균형) + 새 주 계획. us/kr과 동일 패턴:
  #   주경로=telegram-push 체인이 일요일 13:0x 창 감지 → auto dispatch(드롭 0),
  #   백업=위 cron 2개(13:02/13:42, best-effort), 멱등=WEEK 파일 가드 + job concurrency.
  # 소스: docs/reports/{KR,US}-*.md 5거래일 + _kr_pipeline.md 누적 + GAS portfolioMetrics.
  weekly-report:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '2 4 * * 0' || github.event.schedule == '42 4 * * 0')) ||
      (github.event_name == 'workflow_dispatch' && inputs.type == 'weekly')
    runs-on: ubuntu-latest
    concurrency:
      group: market-report-weekly
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already sent today (schedule·auto dispatch)
        id: guard
        run: |
          DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT=docs/reports/WEEK-${DATE_KST}.md
          GUARD_ON=no
          [ "${{ github.event_name }}" = "schedule" ] && GUARD_ON=yes
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.auto }}" = "true" ] && GUARD_ON=yes
          if [ "$GUARD_ON" = "yes" ] && [ -f "$REPORT" ]; then
            echo "already=yes" >> $GITHUB_OUTPUT
            echo "⏭️ 이번 주(${DATE_KST}) 주간 리포트 이미 발송됨 — skip"
          else
            echo "already=no" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.guard.outputs.already == 'no'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code CLI
        if: steps.guard.outputs.already == 'no'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # GAS 지표를 step에서 미리 받아 파일로 — 에이전트의 env 유무 판단 오류(6/28 "환경변수 미설정" 오판) 제거.
      # 공개 repo 로그에 응답 본문(보유 구성) 노출 금지 — HTTP 코드·필드 존재 여부만 echo.
      - name: Pre-fetch GAS portfolio metrics
        if: steps.guard.outputs.already == 'no'
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          mkdir -p /tmp/weekly
          OUT=/tmp/weekly/gas_metrics.json
          if [ -z "$GAS_WEB_APP_URL" ] || [ -z "$TG_WEBHOOK_SECRET" ]; then
            echo '{"success":false,"reason":"env-unset"}' > "$OUT"
            echo "pre-fetch: env unset — 에이전트 degrade 경로로"
          else
            PAYLOAD=$(jq -n --arg s "$TG_WEBHOOK_SECRET" '{action:"portfolioMetrics", secret:$s}')
            code=$(curl -sS -L -m 60 -o "$OUT" -w '%{http_code}' "$GAS_WEB_APP_URL" \
              -H 'Content-Type: application/json' --data "$PAYLOAD" || echo 000)
            if [ "$code" != "200" ] || ! jq -e '.success == true' "$OUT" >/dev/null 2>&1; then
              echo "{\"success\":false,\"reason\":\"http-$code\"}" > "$OUT"
            fi
            echo "pre-fetch: HTTP=$code success=$(jq -r '.success' "$OUT") dailyReturns=$(jq -r '.dailyReturns != null' "$OUT")"
          fi

      - name: Generate weekly report (Claude CLI headless)
        if: steps.guard.outputs.already == 'no'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 폴백용 — 1차는 위 pre-fetch 파일(/tmp/weekly/gas_metrics.json)을 에이전트가 Read.
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          claude -p "$(cat .github/scripts/weekly-prompt.md)" \
            --allowedTools "WebFetch,Bash,Read,Write" \
            --max-turns 40 \
            --model claude-sonnet-4-6

      - name: Determine report file path
        if: steps.guard.outputs.already == 'no'
        id: path
        run: |
          DATE_KST=$(TZ='Asia/Seoul' date +%Y-%m-%d)
          REPORT=docs/reports/WEEK-${DATE_KST}.md
          echo "date_kst=${DATE_KST}" >> $GITHUB_OUTPUT
          echo "report=${REPORT}" >> $GITHUB_OUTPUT
          if [ -f "$REPORT" ]; then
            echo "found=yes" >> $GITHUB_OUTPUT
            echo "✓ found $REPORT"
            wc -c "$REPORT"
            echo "----- REPORT 본문 -----"; cat "$REPORT"; echo "----- END -----"
          else
            echo "found=no" >> $GITHUB_OUTPUT
            echo "✗ not found $REPORT (생성 실패)"
            ls -la docs/reports/ 2>/dev/null || true
          fi

      # 무음 실패 제거 (docs/plans/2026-07-03-무음실패-알림.md)
      - name: Alert on generation failure
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'no' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          MSG="⚠️ 주간 리포트 생성 실패 (${{ steps.path.outputs.date_kst }}) — 파일 미생성. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          IFS=',' read -ra IDS <<< "$TG_CHAT_IDS"
          for id in "${IDS[@]}"; do
            curl -sS -m 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="$(echo "$id" | tr -d ' ')" --data-urlencode text="$MSG" >/dev/null || true
          done
          exit 1

      - name: Send to Telegram
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          python3 .github/scripts/send_telegram.py "${{ steps.path.outputs.report }}"

      - name: Send Email (GAS self)
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        continue-on-error: true   # 부가 채널 — 실패해도 텔레그램·커밋 진행
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          TG_WEBHOOK_SECRET: ${{ secrets.TG_WEBHOOK_SECRET }}
        run: |
          if [ -z "$GAS_WEB_APP_URL" ] || [ -z "$TG_WEBHOOK_SECRET" ]; then
            echo "⏭️ GAS env 미설정 — 이메일 skip"; exit 0
          fi
          SUBJECT="📅 Weekly Recap & Plan — ${{ steps.path.outputs.date_kst }}"
          PAYLOAD=$(jq -n --arg s "$TG_WEBHOOK_SECRET" --arg sub "$SUBJECT" \
            --rawfile t "${{ steps.path.outputs.report }}" \
            '{action:"emailReport", secret:$s, subject:$sub, text:$t}')
          code=$(curl -sS -L -o /tmp/email_resp.txt -w '%{http_code}' "$GAS_WEB_APP_URL" \
            -H 'Content-Type: application/json' --data "$PAYLOAD" || echo 000)
          echo "이메일 HTTP=$code resp=$(cat /tmp/email_resp.txt 2>/dev/null)"

      - name: Commit report
        if: steps.guard.outputs.already == 'no' && steps.path.outputs.found == 'yes' && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        run: |
          git config user.email 'actions@github.com'
          git config user.name 'Market Report Bot'
          git add docs/reports/
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Weekly report ${{ steps.path.outputs.date_kst }} [skip ci]"
            git push
          fi
