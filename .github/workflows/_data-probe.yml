name: _data-probe (임시 진단)

# 2차: 한국 고유 데이터(수급·업종·Top Movers) JSON 소스 + KOSPI200 선물 확인.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe KR-internal JSON sources
        run: |
          probe() {
            local name="$1" url="$2"
            local code
            code=$(curl -sS -L --max-time 20 -A 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X)' \
              -H 'Accept: application/json' -H 'Referer: https://m.stock.naver.com/' \
              -o /tmp/p.txt -w '%{http_code}' "$url" 2>/dev/null || echo "ERR")
            local snip
            snip=$(tr -d '\0' < /tmp/p.txt | tr '\n' ' ' | sed 's/  */ /g' | cut -c1-280)
            echo "──────────────────────────────────────────"
            echo "[$name] HTTP=$code"
            echo "  $snip"
          }

          echo "##### KOSPI200 선물 (Yahoo) #####"
          for s in '%5EKS200' '101.KS' 'KS200.KS'; do
            probe "yahoo $s" "https://query1.finance.yahoo.com/v8/finance/chart/$s?interval=1d&range=5d"
          done

          echo ""
          echo "##### Naver 모바일 API — 지수/종목 통합 (JSON) #####"
          probe "m-index-KOSPI"  "https://m.stock.naver.com/api/index/KOSPI/basic"
          probe "m-index-integ"  "https://m.stock.naver.com/api/index/KOSPI/integration"
          probe "m-stock-005930" "https://m.stock.naver.com/api/stock/005930/integration"

          echo ""
          echo "##### 수급 (외인/기관/개인) JSON 후보 #####"
          probe "m-index-invest"  "https://m.stock.naver.com/api/index/KOSPI/investor?pageSize=5"
          probe "m-index-invTrend" "https://m.stock.naver.com/api/index/KOSPI/investorTrend"
          probe "fchart-invest"    "https://finance.naver.com/sise/investorDealTrendDay.naver?bizdate=20260605"

          echo ""
          echo "##### 업종 (sector) JSON 후보 #####"
          probe "m-industry"      "https://m.stock.naver.com/api/stocks/industry/upjong?pageSize=20"
          probe "api-industry"    "https://api.stock.naver.com/industry/getAllIndustryList"

          echo ""
          echo "##### Top Movers JSON 후보 #####"
          probe "m-up"    "https://m.stock.naver.com/api/stocks/up?page=1&pageSize=5"
          probe "m-down"  "https://m.stock.naver.com/api/stocks/down?page=1&pageSize=5"
          probe "m-changeUp" "https://m.stock.naver.com/api/stocks/marketValue/KOSPI?page=1&pageSize=5"

          echo ""
          echo "##### KR 뉴스 헤드라인 (정적 페이지) #####"
          probe "hankyung-glb" "https://www.hankyung.com/globalmarket"
          probe "einfomax"     "https://news.einfomax.co.kr/news/articleList.html?sc_section_code=S1N4"
          echo "──────────────────────────────────────────"
          echo "probe2 완료"
