name: Deploy Web Desk to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web-desk/**'
      - '.github/workflows/deploy-web-desk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-desk/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: web-desk

      - name: Build
        run: npm run build
        working-directory: web-desk
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Deploy to GitHub Pages (desk subdirectory)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web-desk/dist
          destination_dir: desk
          keep_files: true  # web/ + terminal/(이전) 배포물 보존
          commit_message: 'deploy: update web-desk'
